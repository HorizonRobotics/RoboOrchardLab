# RoboTwin Franka Panda URDF alignment manifest.
#
# The origin URDF's last actuated link (`panda_left_link7` /
# `panda_right_link7`) is rotated by 45 degrees around +Z to reach the
# right/down/front EE convention. Stage 2 inserts `<parent>_ee`
# children; stage 3 inserts a `<parent>_ee_gripper_end` fixed child per
# arm at [0, 0, gripper_forward] in the EE frame.

adapter: robotwin
config:
  module: data_configs.config_robotwin_dataset
  getter: get_dataset_config
  key: franka_panda
  aligned_key: franka_panda_urdf_v2

mesh_search_roots:
  - embodiments/franka-panda

arms:
  - arm_link_keys:
      - panda_left_link1
      - panda_left_link2
      - panda_left_link3
      - panda_left_link4
      - panda_left_link5
      - panda_left_link6
      - panda_left_link7
    ee:
      parent: panda_left_link7
      rotate_z_deg: 45
      gripper_forward: 0.22
  - arm_link_keys:
      - panda_right_link1
      - panda_right_link2
      - panda_right_link3
      - panda_right_link4
      - panda_right_link5
      - panda_right_link6
      - panda_right_link7
    ee:
      parent: panda_right_link7
      rotate_z_deg: 45
      gripper_forward: 0.22

camera_references:
  - panda_left_link7
  - panda_right_link7
