# ARX Lift-2 (InternData-A1) URDF alignment manifest.
#
# The origin URDF's last actuated link (`L_arm_link16` / `R_arm_link26`)
# is rotated by 270 degrees around +Z to reach the right/down/front
# EE convention. Stage 2 inserts `<parent>_ee` children; stage 3
# inserts a `<parent>_ee_gripper_end` fixed child per arm at
# [0, 0, gripper_forward] in the EE frame.

adapter: interna1
config:
  module: data_configs.config_interna1_dataset
  getter: get_dataset_lmdb_config
  key: interna1_arx_lift2
  aligned_key: interna1_arx_lift2_urdf_v2

arms:
  - arm_link_keys:
      - L_arm_link11
      - L_arm_link12
      - L_arm_link13
      - L_arm_link14
      - L_arm_link15
      - L_arm_link16
    ee:
      parent: L_arm_link16
      rotate_z_deg: 270
      gripper_forward: 0.155
  - arm_link_keys:
      - R_arm_link21
      - R_arm_link22
      - R_arm_link23
      - R_arm_link24
      - R_arm_link25
      - R_arm_link26
    ee:
      parent: R_arm_link26
      rotate_z_deg: 270
      gripper_forward: 0.155

camera_references:
  - L_arm_link16
  - R_arm_link26
