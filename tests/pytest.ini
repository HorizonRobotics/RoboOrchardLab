[pytest]
; asyncio_default_fixture_loop_scope = session
; filter syntaxwarnings for isaac and omni
; This is fixed in Python 3.10.14 but we are still on 3.10.12 in the CI
markers =
    sim_env: tests that exercise simulator-backed environment stacks
filterwarnings =
    ignore:invalid escape sequence:Warning
    ignore:.*register_feature.*experimental.*:UserWarning
    ignore:Failed to load dataset using `datasets.load_from_disk`\. Falling back to use wrapped version\.:UserWarning
    ignore:pkg_resources is deprecated as an API\..*:DeprecationWarning
    ignore:Deprecated call to `pkg_resources\.declare_namespace\('google'\)`\..*:DeprecationWarning
    ignore:Deprecated call to `pkg_resources\.declare_namespace\('sphinxcontrib'\)`\..*:DeprecationWarning
    ignore:Deprecated call to `pkg_resources\.declare_namespace\('zope'\)`\..*:DeprecationWarning
    ignore:Failed to find Vulkan ICD file\..*:UserWarning
    ignore:.*Engine is deprecated.*sapien\.Scene\(\).*:DeprecationWarning
    ignore:.*SapienRenderer.*no longer needed.*:DeprecationWarning
    ignore:.*component\.get_pose.*deprecated.*:DeprecationWarning
    ignore:.*dep_util is Deprecated.*:DeprecationWarning
    ignore:.*BinaryAccuracy.*before the .*update.* method.*:UserWarning
