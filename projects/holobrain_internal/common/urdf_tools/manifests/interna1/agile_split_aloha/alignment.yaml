# AgileX Split Aloha (InternData-A1) URDF alignment manifest.
#
# The origin URDF aligns each arm's last actuated link (`left/link6` /
# `right/link6`) with a 180-degree Z rotation to the right/down/front
# convention. Stage 2 inserts `<parent>_ee` children; stage 3 inserts
# a `<parent>_ee_gripper_end` fixed child per arm at
# [0, 0, gripper_forward] in the EE frame.

adapter: interna1
config:
  module: data_configs.config_interna1_dataset
  getter: get_dataset_lmdb_config
  key: interna1_agile_split_aloha
  aligned_key: interna1_agile_split_aloha_urdf_v2

arms:
  - arm_link_keys:
      - left/link1
      - left/link2
      - left/link3
      - left/link4
      - left/link5
      - left/link6
    ee:
      parent: left/link6
      rotate_z_deg: 180
      gripper_forward: 0.14
  - arm_link_keys:
      - right/link1
      - right/link2
      - right/link3
      - right/link4
      - right/link5
      - right/link6
    ee:
      parent: right/link6
      rotate_z_deg: 180
      gripper_forward: 0.14

camera_references:
  - left/link6
  - right/link6
