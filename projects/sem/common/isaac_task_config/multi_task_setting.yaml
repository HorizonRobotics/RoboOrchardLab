  # Event random
  enable_light_random: false
  enable_obj_tex_random: false
  enable_table_tex_random: false
  # Clutter object configuration
  clutter_obj_random:
    enabled: false
    num: 1
    seen_asset_path: "/horizon-bucket/robot_lab/users/chaodong.huang/eval_assets/distractor_set_1_23/seen/"
    unseen_asset_path: "/horizon-bucket/robot_lab/users/chaodong.huang/eval_assets/distractor_set_1_23/unseen/"

# Task-specific overrides
